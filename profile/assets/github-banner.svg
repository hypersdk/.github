<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="340" viewBox="0 0 1100 340" role="img" aria-label="HyperSDK Platform — Post-VMware infrastructure">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#050505"/>
      <stop offset="0.45" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#1c1208"/>
    </linearGradient>
    <linearGradient id="flare" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#f97316"/>
      <stop offset="0.5" stop-color="#fdba74"/>
      <stop offset="1" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop stop-color="#f97316" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="blur"><feGaussianBlur stdDeviation="24"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1100" height="340" rx="18" fill="url(#bg)"/>
  <rect y="0" width="1100" height="5" rx="18" fill="url(#flare)"/>
  <circle cx="120" cy="60" r="90" fill="#f97316" opacity="0.12" filter="url(#blur)"/>
  <circle cx="980" cy="280" r="120" fill="#ea580c" opacity="0.1" filter="url(#blur)"/>
  <g opacity="0.06" stroke="#f97316" stroke-width="1">
    <path d="M0 85h1100M0 170h1100M0 255h1100"/>
    <path d="M137 0v340M412 0v340M687 0v340M962 0v340"/>
  </g>
  <!-- migration flow -->
  <g transform="translate(64 248)">
    <rect width="88" height="44" rx="8" fill="#18181b" stroke="#3f3f46"/>
    <text x="44" y="28" text-anchor="middle" fill="#a1a1aa" font-family="ui-monospace,monospace" font-size="11" font-weight="600">VMware</text>
    <path d="M96 22h36" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="132,22 124,17 124,27" fill="#f97316"/>
    <rect x="140" width="88" height="44" rx="8" fill="#18181b" stroke="#f97316" stroke-opacity="0.5"/>
    <text x="184" y="28" text-anchor="middle" fill="#fdba74" font-family="ui-monospace,monospace" font-size="11" font-weight="600">Convert</text>
    <path d="M236 22h36" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="272,22 264,17 264,27" fill="#22c55e"/>
    <rect x="280" width="100" height="44" rx="8" fill="#14532d" stroke="#22c55e" stroke-opacity="0.6"/>
    <text x="330" y="28" text-anchor="middle" fill="#86efac" font-family="ui-monospace,monospace" font-size="11" font-weight="600">KVM / K8s</text>
  </g>
  <!-- headline -->
  <text x="64" y="88" fill="#fafafa" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5">Post-VMware</text>
  <text x="64" y="136" fill="#fafafa" font-family="system-ui,sans-serif" font-size="46" font-weight="800" letter-spacing="-1.5">Infrastructure</text>
  <text x="64" y="178" fill="#f97316" font-family="system-ui,sans-serif" font-size="20" font-weight="700" letter-spacing="0.2em">HYPERSDK PLATFORM</text>
  <text x="64" y="210" fill="#71717a" font-family="system-ui,sans-serif" font-size="17">Zeus suite · Zyvor AI Labs · 12 products · 2,000+ APIs</text>
  <!-- hero metric -->
  <g transform="translate(780 72)" filter="url(#glow)">
    <rect width="256" height="200" rx="16" fill="#0a0a0a" stroke="url(#flare)" stroke-width="2"/>
    <text x="128" y="72" text-anchor="middle" fill="#f97316" font-family="system-ui,sans-serif" font-size="64" font-weight="800">96.8%</text>
    <text x="128" y="102" text-anchor="middle" fill="#fafafa" font-family="system-ui,sans-serif" font-size="16" font-weight="600">first-boot success</text>
    <line x1="32" y1="120" x2="224" y2="120" stroke="#27272a" stroke-width="1"/>
    <text x="128" y="148" text-anchor="middle" fill="#a1a1aa" font-family="ui-monospace,monospace" font-size="13">10 providers · 400+ dashboard views</text>
    <text x="128" y="174" text-anchor="middle" fill="#52525b" font-family="system-ui,sans-serif" font-size="12">Enterprise VM migration</text>
  </g>
</svg>
